<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MLB Picks" />
  <title>MLB Picks ⚾</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #141414;
      --surface2: #1c1c1c;
      --border:   #242424;
      --accent:   #00e676;
      --accent2:  #00b359;
      --text:     #ffffff;
      --muted:    #666;
      --muted2:   #999;
      --win:      #00e676;
      --loss:     #ff4444;
      --push:     #666;
      --tab-h:    64px;
      --safe-t:   env(safe-area-inset-top, 0px);
      --safe-b:   env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Header ── */
    header {
      padding: calc(var(--safe-t) + 16px) 20px 14px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .header-logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #00e676, #00b359);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .header-sub   { font-size: 11px; color: var(--muted2); margin-top: 1px; }

    .refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--muted2);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px calc(var(--tab-h) + var(--safe-b) + 20px);
    }

    /* ── Tab bar ── */
    nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: calc(var(--tab-h) + var(--safe-b));
      background: rgba(14,14,14,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-b);
      z-index: 20;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .tab-btn .tab-icon { font-size: 22px; line-height: 1; transition: transform 0.2s; }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active .tab-icon { transform: scale(1.1); }

    .tab-indicator {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 3px;
      background: var(--accent);
      border-radius: 0 0 3px 3px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .tab-btn.active .tab-indicator { opacity: 1; }

    /* ── Panels ── */
    .panel { display: none; animation: fadeIn 0.2s ease; }
    .panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }

    .card-accent-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      border-radius: 16px 0 0 16px;
    }

    .card.has-bar { padding-left: 20px; }

    .matchup {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
      margin-bottom: 4px;
    }

    .pick-line {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
      margin: 10px 0 8px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    .tag-strong { background: rgba(0,230,118,0.15); color: var(--accent); }
    .tag-lean   { background: rgba(255,255,255,0.07); color: var(--muted2); }

    .meta-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
    }

    .meta-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .meta-value { font-size: 13px; font-weight: 600; color: var(--text); margin-top: 2px; }

    .odds-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px 8px;
      font-size: 13px;
      font-weight: 700;
    }

    /* ── Record hero ── */
    .record-hero {
      background: linear-gradient(135deg, #141414, #1a1a1a);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 20px 20px;
      margin-bottom: 12px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .record-hero::before {
      content: '⚾';
      position: absolute;
      font-size: 120px;
      opacity: 0.04;
      right: -20px;
      bottom: -20px;
    }

    .season-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .wlp {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 16px;
    }

    .wlp-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
    }

    .wlp-item + .wlp-item::before {
      content: '';
      position: absolute;
      left: 0; top: 10%; bottom: 10%;
      width: 1px;
      background: var(--border);
    }

    .wlp-num  { font-size: 48px; font-weight: 900; line-height: 1; letter-spacing: -2px; }
    .wlp-lbl  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

    .wlp-item.win  .wlp-num { color: var(--win); }
    .wlp-item.loss .wlp-num { color: var(--loss); }
    .wlp-item.push .wlp-num { color: var(--push); }

    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
    }

    .streak-w { background: rgba(0,230,118,0.12); color: var(--win); border: 1px solid rgba(0,230,118,0.2); }
    .streak-l { background: rgba(255,68,68,0.12);  color: var(--loss); border: 1px solid rgba(255,68,68,0.2); }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 10px;
      text-align: center;
    }

    .stat-val { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

    .stat-val.green { color: var(--win); }
    .stat-val.red   { color: var(--loss); }

    /* ── Chart ── */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    .chart-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .chart-wrap { position: relative; height: 160px; }

    /* ── History cards ── */
    .hist-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .hist-result {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .hist-result.W { background: rgba(0,230,118,0.15); color: var(--win); }
    .hist-result.L { background: rgba(255,68,68,0.15);  color: var(--loss); }
    .hist-result.P { background: rgba(100,100,100,0.15); color: var(--muted2); }
    .hist-result.pending { background: var(--surface2); color: var(--muted); font-size: 12px; }

    .hist-body { flex: 1; min-width: 0; }
    .hist-matchup { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist-pick    { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 2px; }
    .hist-meta    { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      padding: 4px 4px 8px;
    }

    /* ── Empty ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty .big { font-size: 52px; margin-bottom: 12px; }
    .empty p    { font-size: 15px; line-height: 1.5; }

    /* ── Spinner ── */
    .spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }

    .spinner::after {
      content: '';
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Press animation ── */
    .card:active, .hist-card:active { transform: scale(0.98); transition: transform 0.1s; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <div class="header-logo">⚾</div>
      <div>
        <div class="header-title">MLB Picks</div>
        <div class="header-sub" id="last-refresh">Loading…</div>
      </div>
    </div>
    <button class="refresh-btn" onclick="refreshAll()">↻ Refresh</button>
  </header>

  <main class="content" id="main-content">
    <div class="panel active" id="panel-today"></div>
    <div class="panel"        id="panel-record"></div>
    <div class="panel"        id="panel-history"></div>
  </main>

  <nav>
    <button class="tab-btn active" data-tab="today">
      <div class="tab-indicator"></div>
      <span class="tab-icon">📅</span>
      <span>Today</span>
    </button>
    <button class="tab-btn" data-tab="record">
      <div class="tab-indicator"></div>
      <span class="tab-icon">📊</span>
      <span>Record</span>
    </button>
    <button class="tab-btn" data-tab="history">
      <div class="tab-indicator"></div>
      <span class="tab-icon">🕐</span>
      <span>History</span>
    </button>
  </nav>
</div>

<script>
let activeTab = 'today';
let chartInst = null;
const REFRESH = 5 * 60 * 1000;

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    if (tab === activeTab) return;
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    loadTab(tab);
  });
});

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function spinner() { return '<div class="spinner"></div>'; }
function setPanel(id, html) { document.getElementById(id).innerHTML = html; }

/* ── TODAY ── */
async function loadToday() {
  setPanel('panel-today', spinner());
  try {
    const picks = await fetchJSON('/api/today');
    setPanel('panel-today', renderToday(picks));
  } catch(e) {
    setPanel('panel-today', `<div class="empty"><p>Failed to load</p></div>`);
  }
}

function renderToday(picks) {
  const today = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  if (!picks.length) {
    return `
      <div class="section-label">${today}</div>
      <div class="empty">
        <div class="big">⚾</div>
        <p>No qualifying picks today</p>
      </div>`;
  }

  const cards = picks.map(p => {
    const isStrong = p.type === 'strong';
    const tag = isStrong
      ? `<span class="tag tag-strong">🔥 Strong</span>`
      : `<span class="tag tag-lean">Lean</span>`;
  const odds = p.pick_odds ? `<span class="odds-pill">${toDecimalOdds(p.pick_odds)}</span>` : '';
    const margin = p.margin != null ? p.margin.toFixed(2) : '—';

    return `
      <div class="card has-bar">
        <div class="card-accent-bar"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
          <div class="matchup">${abbrev(p.away_team)} @ ${abbrev(p.home_team)}</div>
          ${tag}
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px;">${p.away_team} vs ${p.home_team}</div>
        <div class="pick-line">🧢 ${p.pick} ML ${odds}</div>
        <div class="meta-row">
          <div class="meta-item">
            <div class="meta-label">Edge</div>
            <div class="meta-value">${margin}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Away Pitcher</div>
            <div class="meta-value">${p.away_pitcher || '—'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Home Pitcher</div>
            <div class="meta-value">${p.home_pitcher || '—'}</div>
          </div>
        </div>
      </div>`;
  }).join('');

  return `<div class="section-label">${today}</div>${cards}`;
}

/* ── RECORD ── */
async function loadRecord() {
  setPanel('panel-record', spinner());
  try {
    const [rec, chartPts] = await Promise.all([fetchJSON('/api/record'), fetchJSON('/api/chart')]);
    setPanel('panel-record', renderRecord(rec));
    renderChart(chartPts);
  } catch(e) {
    setPanel('panel-record', `<div class="empty"><p>Failed to load</p></div>`);
  }
}

function renderRecord(r) {
  const profitColor = r.profit >= 0 ? 'green' : 'red';
  const roiColor    = r.roi    >= 0 ? 'green' : 'red';
  const winColor    = r.win_pct >= 52.4 ? 'green' : r.win_pct < 45 ? 'red' : '';
  const profitSign  = r.profit >= 0 ? '+' : '';
  const roiSign     = r.roi    >= 0 ? '+' : '';

  let streakHtml = '';
  if (r.streak > 0 && r.streak_type) {
    const cls = r.streak_type === 'W' ? 'streak-w' : 'streak-l';
    const lbl = r.streak_type === 'W'
      ? `🔥 ${r.streak}-Game Win Streak`
      : `❄️ ${r.streak}-Game Losing Streak`;
    streakHtml = `<div style="margin-top:12px;"><span class="streak-badge ${cls}">${lbl}</span></div>`;
  }

  return `
    <div class="record-hero">
      <div class="season-label">2026 Season Record</div>
      <div class="wlp">
        <div class="wlp-item win">
          <div class="wlp-num">${r.wins}</div>
          <div class="wlp-lbl">Wins</div>
        </div>
        <div class="wlp-item loss">
          <div class="wlp-num">${r.losses}</div>
          <div class="wlp-lbl">Losses</div>
        </div>
        <div class="wlp-item push">
          <div class="wlp-num">${r.pushes}</div>
          <div class="wlp-lbl">Pushes</div>
        </div>
      </div>
      ${streakHtml}
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-val ${winColor}">${r.win_pct}%</div>
        <div class="stat-lbl">Win %</div>
      </div>
      <div class="stat-box">
        <div class="stat-val ${roiColor}">${roiSign}${r.roi}%</div>
        <div class="stat-lbl">ROI</div>
      </div>
      <div class="stat-box">
        <div class="stat-val ${profitColor}">${profitSign}$${Math.abs(r.profit).toFixed(0)}</div>
        <div class="stat-lbl">Profit</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Cumulative Profit</div>
      <div class="chart-wrap"><canvas id="profit-chart"></canvas></div>
    </div>`;
}

function renderChart(points) {
  const ctx = document.getElementById('profit-chart');
  if (!ctx) return;
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  if (!points.length) return;

  const labels = points.map(p => {
    const d = new Date(p.date + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  });
  const data  = points.map(p => p.profit);
  const last  = data[data.length - 1] ?? 0;
  const color = last >= 0 ? '#00e676' : '#ff4444';

  chartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: color,
        backgroundColor: last >= 0 ? 'rgba(0,230,118,0.06)' : 'rgba(255,68,68,0.06)',
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 5,
        fill: true,
        tension: 0.4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c1c1c',
          borderColor: '#2a2a2a',
          borderWidth: 1,
          titleColor: '#888',
          bodyColor: color,
          padding: 10,
          callbacks: { label: c => ` ${c.raw >= 0 ? '+' : ''}$${c.raw.toFixed(0)}` }
        }
      },
      scales: {
        x: { ticks: { color:'#444', font:{size:10} }, grid: { color:'#1a1a1a' } },
        y: {
          ticks: { color:'#444', font:{size:10}, callback: v => (v>=0?'+':'')+'$'+v },
          grid:  { color:'#1a1a1a' }
        }
      }
    }
  });
}

/* ── HISTORY ── */
async function loadHistory() {
  setPanel('panel-history', spinner());
  try {
    const picks = await fetchJSON('/api/picks');
    setPanel('panel-history', renderHistory(picks));
  } catch(e) {
    setPanel('panel-history', `<div class="empty"><p>Failed to load</p></div>`);
  }
}

function renderHistory(picks) {
  if (!picks.length) {
    return `<div class="empty"><div class="big">🕐</div><p>No pick history yet</p></div>`;
  }

  return picks.map(p => {
    const r = (p.result || '').toUpperCase();
    const resultClass = r || 'pending';
    const resultLabel = r || '–';
    const margin = p.margin != null ? p.margin.toFixed(2) : '—';
    const odds   = p.pick_odds ? ` · ${toDecimalOdds(p.pick_odds)}` : '';

    return `
      <div class="hist-card">
        <div class="hist-result ${resultClass}">${resultLabel}</div>
        <div class="hist-body">
          <div class="hist-matchup">${p.away_team} @ ${p.home_team}</div>
          <div class="hist-pick">✅ ${p.pick} ML${odds}</div>
          <div class="hist-meta">${formatDate(p.date)} · Edge ${margin}</div>
        </div>
      </div>`;
  }).join('');
}

/* ── Helpers ── */
function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function toDecimalOdds(oddsStr) {
    if (!oddsStr) return '';
    const val = parseFloat(oddsStr);
    if (isNaN(val)) return oddsStr;
    if (val <= -100) return (1 + 100 / Math.abs(val)).toFixed(2);
    if (val >= 100)  return (1 + val / 100).toFixed(2);
    return parseFloat(oddsStr).toFixed(2); // already decimal
}

  const parts = name.split(' ');
  return parts.length >= 2 ? parts[parts.length - 1] : name;
}

function loadTab(tab) {
  if (tab === 'today')   loadToday();
  if (tab === 'record')  loadRecord();
  if (tab === 'history') loadHistory();
}

function refreshAll() {
  loadTab(activeTab);
  const now = new Date();
  document.getElementById('last-refresh').textContent =
    'Updated ' + now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
}

refreshAll();
setInterval(refreshAll, REFRESH);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').catch(() => {});
}
</script>
</body>
</html>
