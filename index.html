<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#00e676" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MLB Picks" />
  <title>MLB Picks ⚾</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── Reset & base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #1a1a1a;
      --surface2: #222222;
      --border:   #2a2a2a;
      --accent:   #00e676;
      --accent2:  #00b359;
      --text:     #f0f0f0;
      --muted:    #888;
      --win:      #00e676;
      --loss:     #ff4444;
      --push:     #888;
      --tab-h:    56px;
      --safe-b:   env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── Layout ─────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    header {
      padding: 16px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    header .subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 12px calc(var(--tab-h) + var(--safe-b) + 12px);
    }

    /* ── Tab bar ────────────────────────────────────────────────────── */
    nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: calc(var(--tab-h) + var(--safe-b));
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-b);
      z-index: 20;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn .icon { font-size: 20px; line-height: 1; }
    .tab-btn.active { color: var(--accent); }

    /* ── Tab panels ─────────────────────────────────────────────────── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Cards ──────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .matchup {
      font-size: 14px;
      font-weight: 700;
    }

    .pick-line {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .pick-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .pick-meta span b { color: var(--text); }

    /* ── Record tab ─────────────────────────────────────────────────── */
    .record-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      margin-bottom: 10px;
    }

    .wlp {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 8px;
    }

    .wlp-item { display: flex; flex-direction: column; align-items: center; }
    .wlp-num  { font-size: 36px; font-weight: 800; line-height: 1; }
    .wlp-lbl  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

    .wlp-item.win  .wlp-num { color: var(--win); }
    .wlp-item.loss .wlp-num { color: var(--loss); }
    .wlp-item.push .wlp-num { color: var(--push); }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }

    .stat-val  { font-size: 20px; font-weight: 800; }
    .stat-lbl  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    .stat-val.green  { color: var(--win); }
    .stat-val.red    { color: var(--loss); }
    .stat-val.muted  { color: var(--muted); }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .chart-card h3 { font-size: 13px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .chart-wrap    { position: relative; height: 180px; }

    /* ── History tab ─────────────────────────────────────────────────── */
    .hist-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      white-space: nowrap;
    }

    thead th {
      background: var(--surface2);
      color: var(--muted);
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 9px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 9px 10px; color: var(--text); background: var(--surface); }

    .result-w { color: var(--win);  font-weight: 700; }
    .result-l { color: var(--loss); font-weight: 700; }
    .result-p { color: var(--push); font-weight: 700; }

    /* ── Empty states ────────────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty .big { font-size: 40px; margin-bottom: 8px; }
    .empty p    { font-size: 14px; }

    /* ── Streak badge ────────────────────────────────────────────────── */
    .streak-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      margin-top: 8px;
    }

    .streak-w { background: rgba(0,230,118,0.15); color: var(--win); }
    .streak-l { background: rgba(255,68,68,0.15);  color: var(--loss); }

    /* ── Spinner ─────────────────────────────────────────────────────── */
    .spinner {
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .spinner::after {
      content: '';
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
