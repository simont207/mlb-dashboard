<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#00e676" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MLB Picks" />
  <title>MLB Picks ⚾</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="dark"] {
      --bg:       #0a0a0a;
      --surface:  #141414;
      --surface2: #1e1e1e;
      --border:   #252525;
      --accent:   #00e676;
      --accent2:  #00b359;
      --text:     #f0f0f0;
      --muted:    #777;
      --win:      #00e676;
      --loss:     #ff4444;
      --push:     #888;
      --shadow:   rgba(0,0,0,0.4);
      --chart-grid: #1a1a1a;
      --chart-tick: #555;
    }

    [data-theme="light"] {
      --bg:       #f2f4f7;
      --surface:  #ffffff;
      --surface2: #eef0f4;
      --border:   #dde1e9;
      --accent:   #00a04a;
      --accent2:  #007a38;
      --text:     #111827;
      --muted:    #6b7280;
      --win:      #00a04a;
      --loss:     #dc2626;
      --push:     #9ca3af;
      --shadow:   rgba(0,0,0,0.1);
      --chart-grid: #e5e7eb;
      --chart-tick: #9ca3af;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      transition: background 0.3s, color 0.3s;
    }

    #app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; }

    /* ── Header ── */
    header {
      padding: calc(12px + env(safe-area-inset-top, 0px)) 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; background: var(--bg); z-index: 10;
      transition: background 0.3s, border-color 0.3s;
    }
    .header-logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    header h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; flex: 1; }
    .header-actions { display: flex; align-items: center; gap: 6px; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, transform 0.1s;
    }
    .icon-btn:active { transform: scale(0.92); }
    .subtitle { font-size: 10px; color: var(--muted); white-space: nowrap; }

    /* ── Content ── */
    .content {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 12px 12px calc(60px + env(safe-area-inset-bottom, 0px) + 12px);
    }

    /* ── Tab bar ── */
    nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
