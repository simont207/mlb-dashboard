<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#00e676" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MLB Picks" />
  <title>MLB Picks ⚾</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── Reset & base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #1a1a1a;
      --surface2: #222222;
      --border:   #2a2a2a;
      --accent:   #00e676;
      --accent2:  #00b359;
      --text:     #f0f0f0;
      --muted:    #888;
      --win:      #00e676;
      --loss:     #ff4444;
      --push:     #888;
      --tab-h:    56px;
      --safe-b:   env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── Layout ─────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    header {
      padding: 16px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    header .subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 12px calc(var(--tab-h) + var(--safe-b) + 12px);
    }

    /* ── Tab bar ────────────────────────────────────────────────────── */
    nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: calc(var(--tab-h) + var(--safe-b));
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-b);
      z-index: 20;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn .icon { font-size: 20px; line-height: 1; }
    .tab-btn.active { color: var(--accent); }

    /* ── Tab panels ─────────────────────────────────────────────────── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Cards ──────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .matchup {
      font-size: 14px;
      font-weight: 700;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .badge-strong { background: rgba(0,230,118,0.2); color: var(--accent); }
    .badge-lean   { background: rgba(255,255,255,0.08); color: var(--muted); }

    .pick-line {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .pick-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .pick-meta span b { color: var(--text); }

    /* ── Record tab ─────────────────────────────────────────────────── */
    .record-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      margin-bottom: 10px;
    }

    .wlp {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 8px;
    }

    .wlp-item { display: flex; flex-direction: column; align-items: center; }
    .wlp-num  { font-size: 36px; font-weight: 800; line-height: 1; }
    .wlp-lbl  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

    .wlp-item.win  .wlp-num { color: var(--win); }
    .wlp-item.loss .wlp-num { color: var(--loss); }
    .wlp-item.push .wlp-num { color: var(--push); }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }

    .stat-val  { font-size: 20px; font-weight: 800; }
    .stat-lbl  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    .stat-val.green  { color: var(--win); }
    .stat-val.red    { color: var(--loss); }
    .stat-val.muted  { color: var(--muted); }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .chart-card h3 { font-size: 13px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .chart-wrap    { position: relative; height: 180px; }

    /* ── History tab ─────────────────────────────────────────────────── */
    .hist-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      white-space: nowrap;
    }

    thead th {
      background: var(--surface2);
      color: var(--muted);
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 9px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 9px 10px; color: var(--text); background: var(--surface); }

    .result-w { color: var(--win);  font-weight: 700; }
    .result-l { color: var(--loss); font-weight: 700; }
    .result-p { color: var(--push); font-weight: 700; }

    /* ── Empty states ────────────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty .big { font-size: 40px; margin-bottom: 8px; }
    .empty p    { font-size: 14px; }

    /* ── Streak badge ────────────────────────────────────────────────── */
    .streak-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      margin-top: 8px;
    }

    .streak-w { background: rgba(0,230,118,0.15); color: var(--win); }
    .streak-l { background: rgba(255,68,68,0.15);  color: var(--loss); }

    /* ── Spinner ─────────────────────────────────────────────────────── */
    .spinner {
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .spinner::after {
      content: '';
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Misc ────────────────────────────────────────────────────────── */
    .divider {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 8px 4px 4px;
    }

    .odds-chip {
      display: inline-block;
      background: var(--surface2);
      border-radius: 6px;
      padding: 1px 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
    }

    .refresh-note {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 8px 0 2px;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <span style="font-size:22px">⚾</span>
    <h1>MLB Picks Bot</h1>
    <span class="subtitle" id="last-refresh">Loading…</span>
  </header>

  <main class="content" id="main-content">
    <!-- panels injected by JS -->
    <div class="panel active" id="panel-today"></div>
    <div class="panel"        id="panel-record"></div>
    <div class="panel"        id="panel-history"></div>
  </main>

  <nav>
    <button class="tab-btn active" data-tab="today">
      <span class="icon">📅</span>Today
    </button>
    <button class="tab-btn" data-tab="record">
      <span class="icon">📊</span>Record
    </button>
    <button class="tab-btn" data-tab="history">
      <span class="icon">📜</span>History
    </button>
  </nav>
</div>

<script>
/* ── State ──────────────────────────────────────────────────────────────── */
let activeTab  = 'today';
let chartInst  = null;
const REFRESH  = 5 * 60 * 1000; // 5 minutes

/* ── Tab switching ──────────────────────────────────────────────────────── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    if (tab === activeTab) return;
    activeTab = tab;

    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');

    loadTab(tab);
  });
});

/* ── Fetch helpers ──────────────────────────────────────────────────────── */
async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function spinner() {
  return '<div class="spinner"></div>';
}

function setPanel(id, html) {
  document.getElementById(id).innerHTML = html;
}

/* ── TODAY tab ──────────────────────────────────────────────────────────── */
async function loadToday() {
  setPanel('panel-today', spinner());
  try {
    const picks = await fetchJSON('/api/today');
    setPanel('panel-today', renderToday(picks));
  } catch (e) {
    setPanel('panel-today', `<div class="empty"><p>Failed to load: ${e.message}</p></div>`);
  }
}

function renderToday(picks) {
  const today = new Date().toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });

  if (!picks.length) {
    return `
      <div style="text-align:center;padding:12px 4px 6px;font-size:13px;color:var(--muted);">${today}</div>
      <div class="empty">
        <div class="big">⚾</div>
        <p>No qualifying picks today</p>
      </div>`;
  }

  const cards = picks.map(p => {
    const isStrong  = p.type === 'strong';
    const badgeCls  = isStrong ? 'badge-strong' : 'badge-lean';
    const badgeTxt  = isStrong ? '🔥 STRONG' : 'LEAN';
    const oddsStr   = p.pick_odds ? `<span class="odds-chip">${p.pick_odds}</span>` : '';
    const marginStr = p.margin != null ? p.margin.toFixed(2) : '—';

    const awayERA = p.away_pitcher ? `${p.away_pitcher.split(' ').pop()}: ERA pending` : '—';
    const homeERA = p.home_pitcher ? `${p.home_pitcher.split(' ').pop()}: ERA pending` : '—';

    return `
      <div class="card">
        <div class="card-header">
          <div class="matchup">${p.away_team} @ ${p.home_team}</div>
          <span class="badge ${badgeCls}">${badgeTxt}</span>
        </div>
        <div class="pick-line">✅ ${p.pick} ML ${oddsStr}</div>
        <div class="pick-meta">
          <span>📊 Edge <b>${marginStr}</b></span>
          <span>🗂️ Type <b>${p.type || '—'}</b></span>
          <span>🏟️ <b>${p.home_team.split(' ').pop()} (home)</b></span>
          <span>📅 <b>${formatDate(p.date)}</b></span>
        </div>
      </div>`;
  }).join('');

  return `
    <div style="text-align:center;padding:12px 4px 6px;font-size:13px;color:var(--muted);">${today}</div>
    <div class="refresh-note">Auto-refreshes every 5 min</div>
    ${cards}`;
}

/* ── RECORD tab ─────────────────────────────────────────────────────────── */
async function loadRecord() {
  setPanel('panel-record', spinner());
  try {
    const [rec, chartPts] = await Promise.all([
      fetchJSON('/api/record'),
      fetchJSON('/api/chart'),
    ]);
    setPanel('panel-record', renderRecord(rec, chartPts));
    renderChart(chartPts);
  } catch (e) {
    setPanel('panel-record', `<div class="empty"><p>Failed to load: ${e.message}</p></div>`);
  }
}

function renderRecord(r, chartPts) {
  const profitColor = r.profit >= 0 ? 'green' : 'red';
  const roiColor    = r.roi    >= 0 ? 'green' : 'red';
  const winColor    = r.win_pct >= 52.4 ? 'green' : r.win_pct < 45 ? 'red' : '';

  let streakHtml = '';
  if (r.streak > 0 && r.streak_type) {
    const cls = r.streak_type === 'W' ? 'streak-w' : 'streak-l';
    const lbl = r.streak_type === 'W' ? `🔥 ${r.streak}-Game Win Streak` : `❄️ ${r.streak}-Game Losing Streak`;
    streakHtml = `<div><span class="streak-badge ${cls}">${lbl}</span></div>`;
  }

  const profitSign  = r.profit  >= 0 ? '+' : '';
  const roiSign     = r.roi     >= 0 ? '+' : '';

  return `
    <div class="record-hero">
      <div class="wlp">
        <div class="wlp-item win">
          <div class="wlp-num">${r.wins}</div>
          <div class="wlp-lbl">Wins</div>
        </div>
        <div class="wlp-item loss">
          <div class="wlp-num">${r.losses}</div>
          <div class="wlp-lbl">Losses</div>
        </div>
        <div class="wlp-item push">
          <div class="wlp-num">${r.pushes}</div>
          <div class="wlp-lbl">Pushes</div>
        </div>
      </div>
      ${streakHtml}
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-val ${winColor}">${r.win_pct}%</div>
        <div class="stat-lbl">Win %</div>
      </div>
      <div class="stat-box">
        <div class="stat-val ${roiColor}">${roiSign}${r.roi}%</div>
        <div class="stat-lbl"ROI</div>
      </div>
      <div class="stat-box">
        <div class="stat-val ${profitColor}">${profitSign}$${Math.abs(r.profit)}</div>
        <div class="stat-lbl">Profit (units)</div>
      </div>
    </div>

    <div class="chart-card">
      <h3>Cumulative Profit</h3>
      <div class="chart-wrap">
        <canvas id="profit-chart"></canvas>
      </div>
    </div>`;
}

function renderChart(points) {
  const ctx = document.getElementById('profit-chart');
  if (!ctx) return;

  if (chartInst) { chartInst.destroy(); chartInst = null; }

  if (!points.length) {
    ctx.parentElement.innerHTML = '<div class="empty" style="padding:20px"><p>No completed picks yet</p></div>';
    return;
  }

  const labels = points.map(p => {
    const d = new Date(p.date + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  });
  const data   = points.map(p => p.profit);
  const last   = data[data.length - 1] ?? 0;
  const color  = last >= 0 ? '#00e676' : '#ff4444';

  chartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor:     color,
        backgroundColor: last >= 0 ? 'rgba(0,230,118,0.08)' : 'rgba(255,68,68,0.08)',
        borderWidth:     2,
        pointRadius:     0,
        pointHoverRadius: 4,
        fill:            true,
        tension:         0.3,
      }]
    },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      interaction:         { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#222',
          titleColor:      '#aaa',
          bodyColor:       color,
          callbacks: {
            label: ctx => {
              const v = ctx.raw;
              return ` ${v >= 0 ? '+' : ''}$${v.toFixed(0)}`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks:  { color: '#666', font: { size: 10 }, maxTicksLimit: 6 },
          grid:   { color: '#1e1e1e' },
        },
        y: {
          ticks: {
            color: '#666',
            font:  { size: 10 },
            callback: v => (v >= 0 ? '+' : '') + '$' + v,
          },
          grid:   { color: '#1e1e1e' },
        }
      }
    }
  });
}

/* ── HISTORY tab ────────────────────────────────────────────────────────── */
async function loadHistory() {
  setPanel('panel-history', spinner());
  try {
    const picks = await fetchJSON('/api/picks');
    setPanel('panel-history', renderHistory(picks));
  } catch (e) {
    setPanel('panel-history', `<div class="empty"><p>Failed to load: ${e.message}</p></div>`);
  }
}

function renderHistory(picks) {
  if (!picks.length) {
    return `<div class="empty"><div class="big">📜</div><p>No pick history yet</p></div>`;
  }

  const rows = picks.map(p => {
    const r       = (p.result || '').toUpperCase();
    const resCls  = r === 'W' ? 'result-w' : r === 'L' ? 'result-l' : 'result-p';
    const resDisp = r || '—';
    const margin  = p.margin != null ? p.margin.toFixed(2) : '—';

    return `
      <tr>
        <td>${formatDate(p.date)}</td>
        <td>${abbrev(p.away_team)} @ ${abbrev(p.home_team)}</td>
        <td>${abbrev(p.pick)}</td>
        <td>${margin}</td>
        <td class="${resCls}">${resDisp}</td>
      </tr>`;
  }).join('');

  return `
    <div class="hist-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Matchup</th>
            <th>Pick</th>
            <th>Edge</th>
            <th>Result</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

/* ── Helpers ────────────────────────────────────────────────────────────── */
function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function abbrev(name) {
  if (!name) return '—';
  const parts = name.split(' ');
  return parts.length >= 2 ? parts[parts.length - 1] : name;
}

/* ── Load & refresh ─────────────────────────────────────────────────────── */
function loadTab(tab) {
  if (tab === 'today')   loadToday();
  if (tab === 'record')  loadRecord();
  if (tab === 'history') loadHistory();
}

function refreshAll() {
  loadTab(activeTab);
  const now = new Date();
  document.getElementById('last-refresh').textContent =
    'Updated ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

// Initial load
refreshAll();

// Auto-refresh every 5 minutes
setInterval(refreshAll, REFRESH);

/* ── Service Worker ─────────────────────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').catch(() => {});
}
</script>
</body>
</html>
