<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#00e676" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MLB Picks" />
  <title>MLB Picks ⚾</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #141414;
      --surface2: #1e1e1e;
      --border:   #252525;
      --accent:   #00e676;
      --accent2:  #00b359;
      --text:     #f0f0f0;
      --muted:    #777;
      --win:      #00e676;
      --loss:     #ff4444;
      --push:     #888;
      --tab-h:    60px;
      --safe-b:   env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .header-logo {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    header .subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── Content ────────────────────────────────────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 12px calc(var(--tab-h) + var(--safe-b) + 12px);
    }

    /* ── Tab bar ────────────────────────────────────────────────────── */
    nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: calc(var(--tab-h) + var(--safe-b));
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-b);
      z-index: 20;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn .icon { font-size: 22px; line-height: 1; }
    .tab-btn.active { color: var(--accent); }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Live Score Ticker ──────────────────────────────────────────── */
    .ticker-wrap {
      margin-bottom: 12px;
      overflow: hidden;
    }

    .ticker-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: #ff4444;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .ticker-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .ticker-scroll::-webkit-scrollbar { display: none; }

    .score-chip {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      min-width: 130px;
      font-size: 11px;
    }

    .score-chip.is-pick {
      border-color: var(--accent2);
      background: rgba(0,230,118,0.06);
    }

    .score-chip-teams {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
    }

    .score-team {
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 600;
    }

    .score-team img {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .score-runs {
      font-weight: 800;
      font-size: 13px;
    }

    .score-status {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
    }

    .score-status.live { color: #ff6b6b; font-weight: 700; }
    .score-status.final { color: var(--muted); }

    /* ── Pick Cards ─────────────────────────────────────────────────── */
    .pick-card {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .pick-card:active { transform: scale(0.98); }

    .pick-card-accent {
      width: 4px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      flex-shrink: 0;
    }

    .pick-card-body {
      flex: 1;
      padding: 14px;
    }

    .matchup-logos {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .team-block {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .team-block.home {
      flex-direction: row-reverse;
      text-align: right;
    }

    .team-logo {
      width: 38px;
      height: 38px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .team-info { flex: 1; }

    .team-city {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.2;
    }

    .team-name {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
    }

    .vs-badge {
      width: 28px;
      height: 28px;
      background: var(--surface2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      flex-shrink: 0;
      margin: 0 6px;
    }

    .pick-winner-line {
      font-size: 15px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .odds-chip {
      display: inline-block;
      background: rgba(0,230,118,0.12);
      border: 1px solid rgba(0,230,118,0.25);
      border-radius: 6px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
    }

    .edge-bar-wrap { margin-bottom: 10px; }

    .edge-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .edge-bar {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .edge-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 3px;
      width: 0;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .era-section {
      background: var(--surface2);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--muted);
    }

    .era-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .era-row + .era-row { margin-top: 4px; }

    .era-name { font-weight: 600; }
    .era-val { font-weight: 700; color: var(--text); }
    .era-l3 { color: var(--muted); font-size: 10px; }

    /* ── Record tab ─────────────────────────────────────────────────── */
    .record-hero {
      background: linear-gradient(135deg, #141414 0%, #1a1a1a 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px 20px 18px;
      text-align: center;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }

    .record-hero::before {
      content: '';
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(0,230,118,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .wlp {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 12px;
    }

    .wlp-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .wlp-item + .wlp-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10%;
      height: 80%;
      width: 1px;
      background: var(--border);
    }

    .wlp-num  { font-size: 42px; font-weight: 900; line-height: 1; letter-spacing: -2px; }
    .wlp-lbl  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }

    .wlp-item.win  .wlp-num { color: var(--win); }
    .wlp-item.loss .wlp-num { color: var(--loss); }
    .wlp-item.push .wlp-num { color: var(--push); }

    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
    }

    .streak-w { background: rgba(0,230,118,0.15); color: var(--win); }
    .streak-l { background: rgba(255,68,68,0.15);  color: var(--loss); }

    /* Win % bar */
    .win-pct-bar-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .win-pct-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .win-pct-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .win-pct-val   { font-size: 22px; font-weight: 800; }
    .win-pct-val.green { color: var(--win); }
    .win-pct-val.red   { color: var(--loss); }

    .pct-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .pct-fill {
      height: 100%;
      border-radius: 4px;
      width: 0;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .pct-fill.green { background: linear-gradient(90deg, var(--accent2), var(--accent)); }
    .pct-fill.red   { background: linear-gradient(90deg, #cc0000, var(--loss)); }

    .pct-markers {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: var(--muted);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 12px;
      text-align: center;
    }

    .stat-val  { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
    .stat-lbl  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }

    .stat-val.green  { color: var(--win); }
    .stat-val.red    { color: var(--loss); }

    /* This week box */
    .week-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .week-box h3 {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .week-record {
      display: flex;
      gap: 8px;
    }

    .week-item {
      flex: 1;
      text-align: center;
      background: var(--surface2);
      border-radius: 10px;
      padding: 10px 6px;
    }

    .week-num { font-size: 20px; font-weight: 800; }
    .week-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    .week-item.w .week-num { color: var(--win); }
    .week-item.l .week-num { color: var(--loss); }
    .week-item.p .week-num { color: var(--push); }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .chart-card h3 { font-size: 11px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .chart-wrap    { position: relative; height: 180px; }

    /* ── History tab ─────────────────────────────────────────────────── */
    .hist-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      white-space: nowrap;
    }

    thead th {
      background: var(--surface2);
      color: var(--muted);
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover td { background: var(--surface2); }
    tbody td { padding: 10px 10px; color: var(--text); background: var(--surface); }

    .result-w { color: var(--win);  font-weight: 800; }
    .result-l { color: var(--loss); font-weight: 800; }
    .result-p { color: var(--push); font-weight: 700; }

    /* ── Empty states ────────────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
    }

    .empty .big { font-size: 48px; margin-bottom: 10px; }
    .empty p    { font-size: 14px; }

    /* ── Spinner ─────────────────────────────────────────────────────── */
    .spinner {
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .spinner::after {
      content: '';
      width: 30px;
      height: 30px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .refresh-note {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 6px 0 10px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 2px 8px;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-logo">⚾</div>
    <div>
      <h1>MLB Picks Bot</h1>
    </div>
    <span class="subtitle" id="last-refresh">Loading…</span>
  </header>

  <main class="content" id="main-content">
    <div class="panel active" id="panel-today"></div>
    <div class="panel"        id="panel-record"></div>
    <div class="panel"        id="panel-history"></div>
  </main>

  <nav>
    <button class="tab-btn active" data-tab="today">
      <span class="icon">📅</span>Today
    </button>
    <button class="tab-btn" data-tab="record">
      <span class="icon">📊</span>Record
    </button>
    <button class="tab-btn" data-tab="history">
      <span class="icon">📜</span>History
    </button>
  </nav>
</div>

<script>
/* ── Team logo map (MLB team ID → logo URL) ─────────────────────────────── */
const TEAM_IDS = {
  "Arizona Diamondbacks": 109, "Atlanta Braves": 144, "Baltimore Orioles": 110,
  "Boston Red Sox": 111, "Chicago Cubs": 112, "Chicago White Sox": 145,
  "Cincinnati Reds": 113, "Cleveland Guardians": 114, "Colorado Rockies": 115,
  "Detroit Tigers": 116, "Houston Astros": 117, "Kansas City Royals": 118,
  "Los Angeles Angels": 108, "Los Angeles Dodgers": 119, "Miami Marlins": 146,
  "Milwaukee Brewers": 158, "Minnesota Twins": 142, "New York Mets": 121,
  "New York Yankees": 147, "Oakland Athletics": 133, "Philadelphia Phillies": 143,
  "Pittsburgh Pirates": 134, "San Diego Padres": 135, "San Francisco Giants": 137,
  "Seattle Mariners": 136, "St. Louis Cardinals": 138, "Tampa Bay Rays": 139,
  "Texas Rangers": 140, "Toronto Blue Jays": 141, "Washington Nationals": 120,
  "Athletics": 133,
};

function logoUrl(teamName) {
  const id = TEAM_IDS[teamName];
  return id ? `https://www.mlbstatic.com/team-logos/${id}.svg` : null;
}

function logoImg(teamName, size = 38) {
  const url = logoUrl(teamName);
  if (!url) return `<div style="width:${size}px;height:${size}px;"></div>`;
  return `<img src="${url}" class="team-logo" style="width:${size}px;height:${size}px;" onerror="this.style.opacity=0" alt="${teamName}">`;
}

/* ── State ──────────────────────────────────────────────────────────────── */
let activeTab = 'today';
let chartInst = null;
const REFRESH = 5 * 60 * 1000;

/* ── Tab switching ──────────────────────────────────────────────────────── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    if (tab === activeTab) return;
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    loadTab(tab);
  });
});

/* ── Fetch helpers ──────────────────────────────────────────────────────── */
async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function spinner() { return '<div class="spinner"></div>'; }
function setPanel(id, html) { document.getElementById(id).innerHTML = html; }

/* ── Animated counter ───────────────────────────────────────────────────── */
function animateVal(el, target, decimals = 0, prefix = '', suffix = '') {
  if (!el) return;
  const duration = 900;
  const start = performance.now();
  const startVal = 0;
  function step(now) {
    const progress = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    const val = startVal + (target - startVal) * ease;
    el.textContent = prefix + val.toFixed(decimals) + suffix;
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ── Edge bar animation ─────────────────────────────────────────────────── */
function animateEdgeBars() {
  document.querySelectorAll('.edge-fill[data-pct]').forEach(el => {
    const pct = parseFloat(el.dataset.pct);
    setTimeout(() => { el.style.width = pct + '%'; }, 100);
  });
}

function animatePctBars() {
  document.querySelectorAll('.pct-fill[data-pct]').forEach(el => {
    const pct = parseFloat(el.dataset.pct);
    setTimeout(() => { el.style.width = pct + '%'; }, 200);
  });
}

/* ── Live Score Ticker ──────────────────────────────────────────────────── */
async function loadLiveScores(myPicks) {
  const today = new Date().toISOString().split('T')[0];
  try {
    const url = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}&hydrate=linescore&gameType=R`;
    const data = await fetch(url).then(r => r.json());
    const games = [];
    for (const d of (data.dates || [])) {
      for (const g of (d.games || [])) {
        games.push(g);
      }
    }
    if (!games.length) return '';

    // Build set of picked teams for highlighting
    const pickedTeams = new Set((myPicks || []).map(p => p.pick));

    const chips = games.map(g => {
      const away     = g.teams?.away?.team?.name || '';
      const home     = g.teams?.home?.team?.name || '';
      const awayR    = g.linescore?.teams?.away?.runs ?? '—';
      const homeR    = g.linescore?.teams?.home?.runs ?? '—';
      const state    = g.status?.abstractGameState || '';
      const detail   = g.status?.detailedState || '';
      const inning   = g.linescore?.currentInning;
      const half     = g.linescore?.inningHalf;

      let statusStr = '';
      let statusCls = 'final';
      if (state === 'Final') {
        statusStr = 'Final';
        statusCls = 'final';
      } else if (state === 'Live') {
        statusStr = half && inning ? `${half === 'Top' ? '▲' : '▼'}${inning}` : 'Live';
        statusCls = 'live';
      } else {
        // Scheduled — show time
        try {
          const dt = new Date(g.gameDate);
          statusStr = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        } catch(e) { statusStr = 'Soon'; }
        statusCls = 'final';
      }

      const isPick = pickedTeams.has(away) || pickedTeams.has(home);
      const awayName = away.split(' ').pop();
      const homeName = home.split(' ').pop();
      const showScore = state === 'Final' || state === 'Live';

      return `
        <div class="score-chip${isPick ? ' is-pick' : ''}">
          <div class="score-chip-teams">
            <div class="score-team">
              ${logoImg(away, 16)}
              <span>${awayName}</span>
            </div>
            ${showScore ? `<span class="score-runs">${awayR}-${homeR}</span>` : '<span style="color:var(--muted);font-size:10px">vs</span>'}
            <div class="score-team" style="justify-content:flex-end">
              <span>${homeName}</span>
              ${logoImg(home, 16)}
            </div>
          </div>
          <div class="score-status ${statusCls}">${statusStr}${isPick ? ' ⚾' : ''}</div>
        </div>`;
    }).join('');

    return `
      <div class="ticker-wrap">
        <div class="ticker-label">
          <span class="live-dot"></span>
          Today's Scores
        </div>
        <div class="ticker-scroll">${chips}</div>
      </div>`;
  } catch(e) {
    return '';
  }
}

/* ── TODAY tab ──────────────────────────────────────────────────────────── */
async function loadToday() {
  setPanel('panel-today', spinner());
  try {
    const picks = await fetchJSON('/api/today');
    const ticker = await loadLiveScores(picks);
    setPanel('panel-today', renderToday(picks, ticker));
    animateEdgeBars();
  } catch (e) {
    setPanel('panel-today', `<div class="empty"><p>Failed to load: ${e.message}</p></div>`);
  }
}

function renderToday(picks, ticker = '') {
  const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

  if (!picks.length) {
    return `
      ${ticker}
      <div style="text-align:center;padding:10px 4px 6px;font-size:13px;color:var(--muted);">${today}</div>
      <div class="empty">
        <div class="big">⚾</div>
        <p>No qualifying picks today</p>
      </div>`;
  }

  const cards = picks.map(p => {
    const oddsStr   = p.pick_odds ? `<span class="odds-chip">${toDecimalOdds(p.pick_odds)}</span>` : '';
    const marginStr = p.margin != null ? p.margin.toFixed(2) : '—';
    const edgePct   = Math.min((p.margin || 0) / 3.0 * 100, 100).toFixed(1);

    const awayCity = p.away_team.split(' ').slice(0, -1).join(' ') || p.away_team;
    const awayName = p.away_team.split(' ').pop();
    const homeCity = p.home_team.split(' ').slice(0, -1).join(' ') || p.home_team;
    const homeName = p.home_team.split(' ').pop();

    const awayLast = p.away_pitcher ? p.away_pitcher.split(' ').pop() : '—';
    const homeLast = p.home_pitcher ? p.home_pitcher.split(' ').pop() : '—';
    const awayERA  = p.away_era != null ? p.away_era.toFixed(2) : '—';
    const homeERA  = p.home_era != null ? p.home_era.toFixed(2) : '—';
    const awayL3   = p.away_recent_era != null ? `<span class="era-l3"> · L3: ${p.away_recent_era.toFixed(2)}</span>` : '';
    const homeL3   = p.home_recent_era != null ? `<span class="era-l3"> · L3: ${p.home_recent_era.toFixed(2)}</span>` : '';

    return `
      <div class="pick-card">
        <div class="pick-card-accent"></div>
        <div class="pick-card-body">
          <div class="matchup-logos">
            <div class="team-block away">
              ${logoImg(p.away_team)}
              <div class="team-info">
                <div class="team-city">${awayCity}</div>
                <div class="team-name">${awayName}</div>
              </div>
            </div>
            <div class="vs-badge">@</div>
            <div class="team-block home">
              <div class="team-info" style="text-align:right">
                <div class="team-city">${homeCity}</div>
                <div class="team-name">${homeName}</div>
              </div>
              ${logoImg(p.home_team)}
            </div>
          </div>

          <div class="pick-winner-line">
            ✅ ${p.pick.split(' ').pop()} ML ${oddsStr}
          </div>

          <div class="edge-bar-wrap">
            <div class="edge-bar-label">
              <span>Model Edge</span>
              <span style="color:var(--text);font-weight:700">${marginStr}</span>
            </div>
            <div class="edge-bar">
              <div class="edge-fill" data-pct="${edgePct}"></div>
            </div>
          </div>

          <div class="era-section">
            <div class="era-row">
              <span class="era-name">📉 ${awayLast}</span>
              <span><span class="era-val">${awayERA}</span> ERA${awayL3}</span>
            </div>
            <div class="era-row">
              <span class="era-name">📈 ${homeLast}</span>
              <span><span class="era-val">${homeERA}</span> ERA${homeL3}</span>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  return `
    ${ticker}
    <div style="text-align:center;padding:6px 4px 2px;font-size:13px;color:var(--muted);">${today}</div>
    <div class="refresh-note">Auto-refreshes every 5 min</div>
    ${cards}`;
}

/* ── RECORD tab ─────────────────────────────────────────────────────────── */
async function loadRecord() {
  setPanel('panel-record', spinner());
  try {
    const [rec, chartPts, allPicks] = await Promise.all([
      fetchJSON('/api/record'),
      fetchJSON('/api/chart'),
      fetchJSON('/api/picks'),
    ]);
    setPanel('panel-record', renderRecord(rec, chartPts, allPicks));
    renderChart(chartPts);
    animatePctBars();

    // Animate counters
    animateVal(document.getElementById('anim-wins'),   rec.wins,   0);
    animateVal(document.getElementById('anim-losses'), rec.losses, 0);
    animateVal(document.getElementById('anim-pushes'), rec.pushes, 0);
    animateVal(document.getElementById('anim-roi'),    rec.roi,    1, rec.roi >= 0 ? '+' : '', '%');
    animateVal(document.getElementById('anim-profit'), Math.abs(rec.profit), 0, rec.profit >= 0 ? '+$' : '-$');
  } catch (e) {
    setPanel('panel-record', `<div class="empty"><p>Failed to load: ${e.message}</p></div>`);
  }
}

function getThisWeek(picks) {
  const now = new Date();
  const dayOfWeek = now.getDay(); // 0=Sun
  const startOfWeek = new Date(now);
  startOfWeek.setDate(now.getDate() - dayOfWeek);
  startOfWeek.setHours(0, 0, 0, 0);

  let w = 0, l = 0, p = 0;
  for (const pick of picks) {
    if (!pick.date) continue;
    const d = new Date(pick.date + 'T00:00:00');
    if (d >= startOfWeek) {
      const r = (pick.result || '').toUpperCase();
      if (r === 'W') w++;
      else if (r === 'L') l++;
      else if (r === 'P') p++;
    }
  }
  return { w, l, p };
}

function renderRecord(r, chartPts, allPicks) {
  const winColor    = r.win_pct >= 55 ? 'green' : r.win_pct < 45 ? 'red' : 'green';
  const profitColor = r.profit >= 0 ? 'green' : 'red';
  const roiColor    = r.roi    >= 0 ? 'green' : 'red';
  const winPctPct   = Math.min(r.win_pct, 100).toFixed(1);
  const week        = getThisWeek(allPicks);

  let streakHtml = '';
  if (r.streak > 0 && r.streak_type) {
    const cls = r.streak_type === 'W' ? 'streak-w' : 'streak-l';
    const lbl = r.streak_type === 'W' ? `🔥 ${r.streak}-Game Win Streak` : `❄️ ${r.streak}-Game Losing Streak`;
    streakHtml = `<div style="margin-top:10px"><span class="streak-badge ${cls}">${lbl}</span></div>`;
  }

  return `
    <div class="record-hero">
      <div class="wlp">
        <div class="wlp-item win">
          <div class="wlp-num" id="anim-wins">${r.wins}</div>
          <div class="wlp-lbl">Wins</div>
        </div>
        <div class="wlp-item loss">
          <div class="wlp-num" id="anim-losses">${r.losses}</div>
          <div class="wlp-lbl">Losses</div>
        </div>
        <div class="wlp-item push">
          <div class="wlp-num" id="anim-pushes">${r.pushes}</div>
          <div class="wlp-lbl">Pushes</div>
        </div>
      </div>
      ${streakHtml}
    </div>

    <div class="win-pct-bar-wrap">
      <div class="win-pct-header">
        <span class="win-pct-title">Win Rate</span>
        <span class="win-pct-val ${winColor}">${r.win_pct}%</span>
      </div>
      <div class="pct-bar">
        <div class="pct-fill ${winColor}" data-pct="${winPctPct}"></div>
      </div>
      <div class="pct-markers">
        <span>0%</span>
        <span style="color:${winColor === 'green' ? 'var(--accent)' : 'var(--loss)'}">↑ ${r.win_pct}%</span>
        <span>100%</span>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-val ${roiColor}" id="anim-roi">${r.roi >= 0 ? '+' : ''}${r.roi}%</div>
        <div class="stat-lbl">ROI</div>
      </div>
      <div class="stat-box">
        <div class="stat-val ${profitColor}" id="anim-profit">${r.profit >= 0 ? '+' : '-'}$${Math.abs(r.profit)}</div>
        <div class="stat-lbl">Profit (units)</div>
      </div>
    </div>

    <div class="week-box">
      <h3>📅 This Week</h3>
      <div class="week-record">
        <div class="week-item w">
          <div class="week-num">${week.w}</div>
          <div class="week-lbl">Wins</div>
        </div>
        <div class="week-item l">
          <div class="week-num">${week.l}</div>
          <div class="week-lbl">Losses</div>
        </div>
        <div class="week-item p">
          <div class="week-num">${week.p}</div>
          <div class="week-lbl">Pushes</div>
        </div>
        <div class="week-item" style="background:var(--surface2)">
          <div class="week-num" style="color:var(--text)">${week.w + week.l > 0 ? (week.w / (week.w + week.l) * 100).toFixed(0) + '%' : '—'}</div>
          <div class="week-lbl">Win %</div>
        </div>
      </div>
    </div>

    <div class="chart-card">
      <h3>Cumulative Profit</h3>
      <div class="chart-wrap">
        <canvas id="profit-chart"></canvas>
      </div>
    </div>`;
}

function renderChart(points) {
  const ctx = document.getElementById('profit-chart');
  if (!ctx) return;
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  if (!points.length) {
    ctx.parentElement.innerHTML = '<div class="empty" style="padding:20px"><p>No completed picks yet</p></div>';
    return;
  }

  const labels = points.map(p => {
    const d = new Date(p.date + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  });
  const data  = points.map(p => p.profit);
  const last  = data[data.length - 1] ?? 0;
  const color = last >= 0 ? '#00e676' : '#ff4444';

  chartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor:      color,
        backgroundColor:  last >= 0 ? 'rgba(0,230,118,0.08)' : 'rgba(255,68,68,0.08)',
        borderWidth:      2,
        pointRadius:      0,
        pointHoverRadius: 5,
        fill:             true,
        tension:          0.4,
      }]
    },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      interaction:         { mode: 'index', intersect: false },
      animation:           { duration: 1000, easing: 'easeOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e1e1e',
          borderColor:     '#333',
          borderWidth:     1,
          titleColor:      '#aaa',
          bodyColor:       color,
          padding:         10,
          callbacks: {
            label: ctx => ` ${ctx.raw >= 0 ? '+' : ''}$${ctx.raw.toFixed(0)}`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#555', font: { size: 10 }, maxTicksLimit: 6 },
          grid:  { color: '#1a1a1a' },
        },
        y: {
          ticks: {
            color: '#555',
            font:  { size: 10 },
            callback: v => (v >= 0 ? '+' : '') + '$' + v,
          },
          grid: { color: '#1a1a1a' },
        }
      }
    }
  });
}

/* ── HISTORY tab ────────────────────────────────────────────────────────── */
async function loadHistory() {
  setPanel('panel-history', spinner());
  try {
    const picks = await fetchJSON('/api/picks');
    setPanel('panel-history', renderHistory(picks));
  } catch (e) {
    setPanel('panel-history', `<div class="empty"><p>Failed to load: ${e.message}</p></div>`);
  }
}

function renderHistory(picks) {
  if (!picks.length) {
    return `<div class="empty"><div class="big">📜</div><p>No pick history yet</p></div>`;
  }

  const rows = picks.map(p => {
    const r      = (p.result || '').toUpperCase();
    const resCls = r === 'W' ? 'result-w' : r === 'L' ? 'result-l' : 'result-p';
    const margin = p.margin != null ? p.margin.toFixed(2) : '—';
    const odds   = toDecimalOdds(p.pick_odds) || '—';
    const logoA  = logoUrl(p.away_team);
    const logoH  = logoUrl(p.home_team);
    const imgA   = logoA ? `<img src="${logoA}" style="width:14px;height:14px;object-fit:contain;vertical-align:middle;margin-right:3px;" onerror="this.style.display='none'">` : '';
    const imgH   = logoH ? `<img src="${logoH}" style="width:14px;height:14px;object-fit:contain;vertical-align:middle;margin-right:3px;" onerror="this.style.display='none'">` : '';

    return `
      <tr>
        <td>${formatDate(p.date)}</td>
        <td>${imgA}${abbrev(p.away_team)} @ ${imgH}${abbrev(p.home_team)}</td>
        <td>${abbrev(p.pick)}</td>
        <td>${odds}</td>
        <td>${margin}</td>
        <td class="${resCls}">${r || '—'}</td>
      </tr>`;
  }).join('');

  return `
    <div class="hist-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Matchup</th><th>Pick</th><th>Odds</th><th>Edge</th><th>Result</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

/* ── Helpers ────────────────────────────────────────────────────────────── */
function toDecimalOdds(oddsStr) {
  if (!oddsStr) return '';
  const val = parseFloat(oddsStr);
  if (isNaN(val)) return oddsStr;
  if (val <= -100) return (1 + 100 / Math.abs(val)).toFixed(2);
  if (val >= 100)  return (1 + val / 100).toFixed(2);
  return parseFloat(oddsStr).toFixed(2);
}

function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function abbrev(name) {
  if (!name) return '—';
  const parts = name.split(' ');
  return parts.length >= 2 ? parts[parts.length - 1] : name;
}

/* ── Load & refresh ─────────────────────────────────────────────────────── */
function loadTab(tab) {
  if (tab === 'today')   loadToday();
  if (tab === 'record')  loadRecord();
  if (tab === 'history') loadHistory();
}

function refreshAll() {
  loadTab(activeTab);
  const now = new Date();
  document.getElementById('last-refresh').textContent =
    'Updated ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

refreshAll();
setInterval(refreshAll, REFRESH);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').catch(() => {});
}
</script>
