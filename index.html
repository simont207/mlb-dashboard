<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#00e676" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MLB Picks" />
  <title>MLB Picks ⚾</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
      --border: #252525; --accent: #00e676; --accent2: #00b359;
      --text: #f0f0f0; --muted: #777; --win: #00e676;
      --loss: #ff4444; --push: #888;
    }
    [data-theme="light"] {
      --bg: #f2f4f7; --surface: #ffffff; --surface2: #eef0f4;
      --border: #dde1e9; --accent: #00a04a; --accent2: #007a38;
      --text: #111827; --muted: #6b7280; --win: #00a04a;
      --loss: #dc2626; --push: #9ca3af;
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased;
      overscroll-behavior: none; transition: background 0.3s, color 0.3s;
    }
    #app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; }

    header {
      padding: 12px 14px 10px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    .header-logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 18px; flex-shrink: 0;
    }
    header h1 { font-size: 17px; font-weight: 800; flex: 1; }
    .header-actions { display: flex; align-items: center; gap: 6px; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .subtitle { font-size: 10px; color: var(--muted); white-space: nowrap; }

    .content {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 12px 12px calc(60px + env(safe-area-inset-bottom, 0px) + 12px);
    }

    nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      height: calc(60px + env(safe-area-inset-bottom, 0px));
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 20;
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; background: none; border: none;
      color: var(--muted); font-size: 10px; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn .icon { font-size: 22px; line-height: 1; }
    .tab-btn.active { color: var(--accent); }
    .panel { display: none; } .panel.active { display: block; }

    /* Toast */
    .toast {
      position: fixed; top: 70px; left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: var(--accent); color: #000; font-size: 13px; font-weight: 700;
      padding: 10px 18px; border-radius: 20px; z-index: 100;
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; max-width: 300px; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Live ticker */
    .ticker-wrap { margin-bottom: 12px; }
    .ticker-label {
      font-size: 10px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
      display: flex; align-items: center; gap: 6px;
    }
    .live-dot { width: 6px; height: 6px; background: #ff4444; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .ticker-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .ticker-scroll::-webkit-scrollbar { display: none; }
    .score-chip {
      flex-shrink: 0; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px 10px; min-width: 130px;
    }
    .score-chip.is-pick { border-color: var(--accent2); background: rgba(0,179,89,0.06); }
    .score-chip-teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .score-team { display: flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 700; }
    .score-runs { font-weight: 900; font-size: 12px; }
    .score-status { font-size: 10px; color: var(--muted); text-align: center; }
    .score-status.live { color: #ff6b6b; font-weight: 700; }

    /* Pick cards */
    .pick-card {
      display: flex; background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; margin-bottom: 12px; overflow: hidden;
    }
    .pick-card-accent { width: 4px; background: linear-gradient(180deg, var(--accent), var(--accent2)); flex-shrink: 0; }
    .pick-card-body { flex: 1; padding: 14px; }
    .matchup-logos { display: flex; align-items: center; margin-bottom: 12px; }
    .team-block { flex: 1; display: flex; align-items: center; gap: 8px; }
    .team-block.home { flex-direction: row-reverse; }
    .team-info { flex: 1; }
    .team-block.home .team-info { text-align: right; }
    .team-city { font-size: 10px; color: var(--muted); line-height: 1.2; }
    .team-name { font-size: 13px; font-weight: 800; line-height: 1.2; }
    .vs-badge {
      width: 26px; height: 26px; background: var(--surface2); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; color: var(--muted); flex-shrink: 0; margin: 0 6px;
    }
    .pick-winner-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .pick-winner-line { font-size: 15px; font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 8px; }
    .odds-chip {
      display: inline-block; background: rgba(0,179,89,0.12);
      border: 1px solid rgba(0,179,89,0.3); border-radius: 6px;
      padding: 1px 7px; font-size: 11px; font-weight: 700; color: var(--accent);
    }

    /* Confidence meter */
    .conf-meter { flex-shrink: 0; }

    /* Edge bar */
    .edge-bar-wrap { margin-bottom: 10px; }
    .edge-bar-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 4px; }
    .edge-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .edge-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 3px; width: 0; transition: width 1.3s cubic-bezier(0.4,0,0.2,1);
    }

    /* ERA */
    .era-section { background: var(--surface2); border-radius: 10px; padding: 8px 10px; font-size: 11px; color: var(--muted); margin-bottom: 10px; }
    .era-row { display: flex; justify-content: space-between; align-items: center; }
    .era-row + .era-row { margin-top: 4px; }
    .era-name { font-weight: 600; }
    .era-val { font-weight: 800; color: var(--text); }
    .era-l3 { color: var(--muted); font-size: 10px; }

    /* Reasoning */
    .reasoning-toggle {
      width: 100%; background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 10px; color: var(--muted);
      font-size: 11px; font-weight: 600; cursor: pointer;
      text-align: left; display: flex; align-items: center;
      justify-content: space-between; -webkit-tap-highlight-color: transparent;
    }
    .reasoning-body { display: none; margin-top: 8px; background: var(--surface2); border-radius: 10px; padding: 10px 12px; font-size: 12px; color: var(--muted); }
    .reasoning-body.open { display: block; }
    .reasoning-body li { padding: 3px 0; list-style: none; }
    .reasoning-body li::before { content: '→ '; color: var(--accent); font-weight: 700; }

    /* Record */
    .record-hero { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 22px 20px 18px; text-align: center; margin-bottom: 10px; }
    .wlp { display: flex; justify-content: center; margin-bottom: 12px; }
    .wlp-item { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
    .wlp-item + .wlp-item::before { content: ''; position: absolute; left: 0; top: 10%; height: 80%; width: 1px; background: var(--border); }
    .wlp-num { font-size: 44px; font-weight: 900; line-height: 1; letter-spacing: -2px; }
    .wlp-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }
    .wlp-item.win .wlp-num  { color: var(--win); }
    .wlp-item.loss .wlp-num { color: var(--loss); }
    .wlp-item.push .wlp-num { color: var(--push); }
    .streak-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; }
    .streak-w { background: rgba(0,230,118,0.15); color: var(--win); }
    .streak-l { background: rgba(255,68,68,0.15); color: var(--loss); }

    .win-pct-bar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
    .win-pct-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
    .win-pct-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .win-pct-val { font-size: 22px; font-weight: 900; }
    .win-pct-val.green { color: var(--win); } .win-pct-val.red { color: var(--loss); }
    .pct-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
    .pct-fill { height: 100%; border-radius: 4px; width: 0; transition: width 1.3s cubic-bezier(0.4,0,0.2,1); }
    .pct-fill.green { background: linear-gradient(90deg, var(--accent2), var(--accent)); }
    .pct-fill.red   { background: linear-gradient(90deg, #991b1b, var(--loss)); }
    .pct-markers { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 12px; text-align: center; }
    .stat-val { font-size: 22px; font-weight: 900; } .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }
    .stat-val.green { color: var(--win); } .stat-val.red { color: var(--loss); }

    .week-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
    .week-box h3 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .week-record { display: flex; gap: 8px; }
    .week-item { flex: 1; text-align: center; background: var(--surface2); border-radius: 10px; padding: 10px 6px; }
    .week-num { font-size: 20px; font-weight: 800; } .week-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
    .week-item.w .week-num { color: var(--win); } .week-item.l .week-num { color: var(--loss); } .week-item.p .week-num { color: var(--push); }

    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
    .chart-card h3 { font-size: 11px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .chart-wrap { position: relative; height: 180px; }

    .hist-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 14px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
    thead th { background: var(--surface2); color: var(--muted); font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 10px; color: var(--text); background: var(--surface); }
    tbody tr:hover td { background: var(--surface2); }
    .result-w { color: var(--win); font-weight: 800; } .result-l { color: var(--loss); font-weight: 800; } .result-p { color: var(--push); font-weight: 700; }

    .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty .big { font-size: 48px; margin-bottom: 10px; } .empty p { font-size: 14px; }
    .spinner { display: flex; justify-content: center; padding: 40px; }
    .spinner::after { content: ''; width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .refresh-note { text-align: center; font-size: 11px; color: var(--muted); padding: 6px 0 10px; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-logo">⚾</div>
    <h1>MLB Picks Bot</h1>
    <div class="header-actions">
      <span class="subtitle" id="last-refresh">Loading…</span>
      <button class="icon-btn" id="notif-btn" onclick="handleNotifBtn()">🔔</button>
      <button class="icon-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
  </header>

  <div class="toast" id="toast"></div>

  <main class="content">
    <div class="panel active" id="panel-today"></div>
    <div class="panel"        id="panel-record"></div>
    <div class="panel"        id="panel-history"></div>
  </main>

  <nav>
    <button class="tab-btn active" data-tab="today"><span class="icon">📅</span>Today</button>
    <button class="tab-btn" data-tab="record"><span class="icon">📊</span>Record</button>
    <button class="tab-btn" data-tab="history"><span class="icon">📜</span>History</button>
  </nav>
</div>
<script>
/* ── Team logos ─────────────────────────────────────────────────────── */
var TEAM_IDS = {
  "Arizona Diamondbacks":109,"Atlanta Braves":144,"Baltimore Orioles":110,
  "Boston Red Sox":111,"Chicago Cubs":112,"Chicago White Sox":145,
  "Cincinnati Reds":113,"Cleveland Guardians":114,"Colorado Rockies":115,
  "Detroit Tigers":116,"Houston Astros":117,"Kansas City Royals":118,
  "Los Angeles Angels":108,"Los Angeles Dodgers":119,"Miami Marlins":146,
  "Milwaukee Brewers":158,"Minnesota Twins":142,"New York Mets":121,
  "New York Yankees":147,"Oakland Athletics":133,"Philadelphia Phillies":143,
  "Pittsburgh Pirates":134,"San Diego Padres":135,"San Francisco Giants":137,
  "Seattle Mariners":136,"St. Louis Cardinals":138,"Tampa Bay Rays":139,
  "Texas Rangers":140,"Toronto Blue Jays":141,"Washington Nationals":120,"Athletics":133
};
function logoUrl(n) { var id=TEAM_IDS[n]; return id ? 'https://www.mlbstatic.com/team-logos/'+id+'.svg' : null; }
function logoImg(n,s) {
  s = s||38;
  var url=logoUrl(n);
  if(!url) return '<div style="width:'+s+'px;height:'+s+'px"></div>';
  return '<img src="'+url+'" style="width:'+s+'px;height:'+s+'px;object-fit:contain;flex-shrink:0" onerror="this.style.opacity=0" alt="">';
}

/* ── State ──────────────────────────────────────────────────────────── */
var activeTab = 'today';
var chartInst = null;
var REFRESH   = 5 * 60 * 1000;

/* ── Theme ──────────────────────────────────────────────────────────── */
function getTheme() { return localStorage.getItem('theme') || 'dark'; }
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t==='dark' ? '🌙' : '☀️';
  localStorage.setItem('theme', t);
}
function toggleTheme() { applyTheme(getTheme()==='dark' ? 'light' : 'dark'); }
applyTheme(getTheme());

/* ── Notifications ──────────────────────────────────────────────────── */
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 3000);
}
function updateNotifBtn() {
  var btn = document.getElementById('notif-btn');
  if(!('Notification' in window)) { btn.style.opacity='0.4'; return; }
  btn.textContent = Notification.permission==='granted' ? '🔔' : '🔕';
}
function handleNotifBtn() {
  if(!('Notification' in window)) { showToast('Notifications not supported'); return; }
  if(Notification.permission==='granted') { showToast('Notifications are on!'); return; }
  if(Notification.permission==='denied')  { showToast('Notifications blocked in settings'); return; }
  Notification.requestPermission().then(function(p){ updateNotifBtn(); if(p==='granted') showToast('Notifications enabled!'); });
}
function maybeNotify(picks) {
  if(!picks.length) return;
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  var today = new Date().toISOString().split('T')[0];
  if(localStorage.getItem('notifDate')===today) return;
  localStorage.setItem('notifDate', today);
  var names = picks.map(function(p){ return p.pick.split(' ').pop(); }).join(', ');
  try { new Notification('⚾ '+picks.length+' Pick'+(picks.length>1?'s':'')+' Today!', {body:names,icon:'/static/icon-192.png'}); } catch(e){}
}
updateNotifBtn();

/* ── Tab switching ──────────────────────────────────────────────────── */
document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var tab = btn.dataset.tab;
    if(tab===activeTab) return;
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
    document.getElementById('panel-'+tab).classList.add('active');
    loadTab(tab);
  });
});

function fetchJSON(url) {
  return fetch(url).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); });
}
function spinner() { return '<div class="spinner"></div>'; }
function setPanel(id,h) { document.getElementById(id).innerHTML = h; }

/* ── Animated counter ───────────────────────────────────────────────── */
function animateVal(el, target, decimals, prefix, suffix) {
  if(!el) return;
  decimals=decimals||0; prefix=prefix||''; suffix=suffix||'';
  var dur=900, t0=performance.now();
  function step(now) {
    var p=Math.min((now-t0)/dur,1), e=1-Math.pow(1-p,3);
    el.textContent = prefix+(target*e).toFixed(decimals)+suffix;
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ── Confidence meter ───────────────────────────────────────────────── */
function confScore(margin) { return Math.min(Math.round(50 + margin*13), 90); }
function confMeter(margin) {
  var pct   = confScore(margin);
  var color = pct>=72 ? '#00e676' : pct>=62 ? '#f59e0b' : '#f87171';
  var r=19, circ=+(2*Math.PI*r).toFixed(2), dash=+(circ-(pct/100)*circ).toFixed(2);
  return '<div class="conf-meter" style="position:relative;width:50px;height:50px;flex-shrink:0">'
    +'<svg width="50" height="50" viewBox="0 0 50 50">'
    +'<circle cx="25" cy="25" r="'+r+'" fill="none" stroke="var(--border)" stroke-width="4"/>'
    +'<circle cx="25" cy="25" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="4"'
    +' stroke-dasharray="'+circ+'" stroke-dashoffset="'+circ+'"'
    +' data-target="'+dash+'" stroke-linecap="round" transform="rotate(-90 25 25)"'
    +' style="transition:stroke-dashoffset 1.3s cubic-bezier(0.4,0,0.2,1)"/>'
    +'</svg>'
    +'<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1">'
    +'<span style="font-size:12px;font-weight:900;color:'+color+'">'+pct+'</span>'
    +'<span style="font-size:8px;color:var(--muted);font-weight:700">CONF</span>'
    +'</div></div>';
}
function animateConfMeters() {
  document.querySelectorAll('.conf-meter svg circle[data-target]').forEach(function(el){
    var t=el.getAttribute('data-target');
    setTimeout(function(){ el.style.strokeDashoffset=t; }, 150);
  });
}
function animateEdgeBars() {
  document.querySelectorAll('.edge-fill[data-pct]').forEach(function(el){
    setTimeout(function(){ el.style.width=el.getAttribute('data-pct')+'%'; }, 100);
  });
}
function animatePctBars() {
  document.querySelectorAll('.pct-fill[data-pct]').forEach(function(el){
    setTimeout(function(){ el.style.width=el.getAttribute('data-pct')+'%'; }, 200);
  });
}

/* ── Pick reasoning ─────────────────────────────────────────────────── */
function genReasons(p) {
  var reasons=[], isAway=(p.pick===p.away_team);
  var pickedERA = isAway ? p.away_era : p.home_era;
  var oppERA    = isAway ? p.home_era : p.away_era;
  var pickedP   = isAway ? p.away_pitcher : p.home_pitcher;
  var oppP      = isAway ? p.home_pitcher : p.away_pitcher;
  if(pickedERA!=null && oppERA!=null) {
    var pL=(pickedP||'').split(' ').pop(), oL=(oppP||'').split(' ').pop();
    if(pickedERA < oppERA) reasons.push(pL+' has better ERA ('+pickedERA.toFixed(2)+') vs '+oL+' ('+oppERA.toFixed(2)+')');
    else reasons.push('Model edge overcomes ERA gap — stronger team stats overall');
  }
  var recent = isAway ? p.away_recent_era : p.home_recent_era;
  var season = isAway ? p.away_era : p.home_era;
  if(recent!=null && season!=null) {
    if(recent < season) reasons.push('Pitcher trending well — L3 ERA ('+recent.toFixed(2)+') better than season avg');
    else if(recent > season+1.5) reasons.push('Note: pitcher trending cold recently (L3 ERA '+recent.toFixed(2)+')');
  }
  if(!isAway) reasons.push(p.pick.split(' ').pop()+' have home field advantage');
  if(p.margin>=2.0) reasons.push('Very strong model edge of '+p.margin.toFixed(2)+' — high conviction');
  else if(p.margin>=1.5) reasons.push('Solid model edge of '+p.margin.toFixed(2));
  else reasons.push('Model edge of '+p.margin.toFixed(2)+' above the 1.00 threshold');
  return reasons;
}
function toggleReasoning(id) {
  var btn=document.getElementById('rb-'+id), body=document.getElementById('rd-'+id);
  if(!btn||!body) return;
  var open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  btn.querySelector('.arr').textContent = open ? '▾' : '▴';
}

/* ── Live scores ────────────────────────────────────────────────────── */
function loadLiveScores(myPicks) {
  var today = new Date().toISOString().split('T')[0];
  var url   = 'https://statsapi.mlb.com/api/v1/schedule?sportId=1&date='+today+'&hydrate=linescore&gameType=R';
  return fetch(url).then(function(r){ return r.json(); }).then(function(data){
    var games=(data.dates||[]).reduce(function(a,d){ return a.concat(d.games||[]); },[]);
    if(!games.length) return '';
    var picked={}; (myPicks||[]).forEach(function(p){ picked[p.pick]=true; });
    var chips=games.map(function(g){
      var away=g.teams&&g.teams.away&&g.teams.away.team&&g.teams.away.team.name||'';
      var home=g.teams&&g.teams.home&&g.teams.home.team&&g.teams.home.team.name||'';
      var awayR=g.linescore&&g.linescore.teams&&g.linescore.teams.away&&g.linescore.teams.away.runs!=null?g.linescore.teams.away.runs:'—';
      var homeR=g.linescore&&g.linescore.teams&&g.linescore.teams.home&&g.linescore.teams.home.runs!=null?g.linescore.teams.home.runs:'—';
      var state=g.status&&g.status.abstractGameState||'';
      var inning=g.linescore&&g.linescore.currentInning;
      var half=g.linescore&&g.linescore.inningHalf;
      var statusStr='', statusCls='';
      if(state==='Final'){ statusStr='Final'; }
      else if(state==='Live'){ statusStr=(half&&inning?(half==='Top'?'▲':'▼')+inning:'Live'); statusCls='live'; }
      else { try{ statusStr=new Date(g.gameDate).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }catch(e){ statusStr='Soon'; } }
      var isPick=picked[away]||picked[home];
      var showScore=state==='Final'||state==='Live';
      return '<div class="score-chip'+(isPick?' is-pick':'')+'"><div class="score-chip-teams">'
        +'<div class="score-team">'+logoImg(away,14)+away.split(' ').pop()+'</div>'
        +(showScore?'<span class="score-runs">'+awayR+'-'+homeR+'</span>':'<span style="font-size:10px;color:var(--muted)">vs</span>')
        +'<div class="score-team">'+home.split(' ').pop()+logoImg(home,14)+'</div>'
        +'</div><div class="score-status '+statusCls+'">'+statusStr+(isPick?' ⚾':'')+'</div></div>';
    }).join('');
    return '<div class="ticker-wrap"><div class="ticker-label"><span class="live-dot"></span>Today\'s Scores</div>'
      +'<div class="ticker-scroll">'+chips+'</div></div>';
  }).catch(function(){ return ''; });
}

/* ── Today tab ──────────────────────────────────────────────────────── */
function loadToday() {
  setPanel('panel-today', spinner());
  fetchJSON('/api/today').then(function(picks){
    loadLiveScores(picks).then(function(ticker){
      setPanel('panel-today', renderToday(picks, ticker));
      animateEdgeBars();
      animateConfMeters();
      maybeNotify(picks);
    });
  }).catch(function(e){
    setPanel('panel-today', '<div class="empty"><p>Failed to load: '+e.message+'</p></div>');
  });
}

function renderToday(picks, ticker) {
  ticker = ticker||'';
  var today = new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  if(!picks.length) {
    return ticker+'<div style="text-align:center;padding:10px 4px;font-size:13px;color:var(--muted)">'+today+'</div>'
      +'<div class="empty"><div class="big">⚾</div><p>No qualifying picks today</p></div>';
  }
  var cards = picks.map(function(p,i){
    var oddsStr   = p.pick_odds ? '<span class="odds-chip">'+toDecimalOdds(p.pick_odds)+'</span>' : '';
    var marginStr = p.margin!=null ? p.margin.toFixed(2) : '—';
    var edgePct   = Math.min((p.margin||0)/3.0*100,100).toFixed(1);
    var awayParts = p.away_team.split(' ');
    var awayCity  = awayParts.slice(0,-1).join(' ');
    var awayName  = awayParts[awayParts.length-1];
    var homeParts = p.home_team.split(' ');
    var homeCity  = homeParts.slice(0,-1).join(' ');
    var homeName  = homeParts[homeParts.length-1];
    var awayLast  = (p.away_pitcher||'').split(' ').pop()||'—';
    var homeLast  = (p.home_pitcher||'').split(' ').pop()||'—';
    var awayERA   = p.away_era!=null ? p.away_era.toFixed(2) : '—';
    var homeERA   = p.home_era!=null ? p.home_era.toFixed(2) : '—';
    var awayL3    = p.away_recent_era!=null ? '<span class="era-l3"> · L3: '+p.away_recent_era.toFixed(2)+'</span>' : '';
    var homeL3    = p.home_recent_era!=null ? '<span class="era-l3"> · L3: '+p.home_recent_era.toFixed(2)+'</span>' : '';
    var reasons   = genReasons(p);
    var reasonHtml= '<ul>'+reasons.map(function(r){ return '<li>'+r+'</li>'; }).join('')+'</ul>';
    var pickLast  = p.pick.split(' ').pop();
    return '<div class="pick-card"><div class="pick-card-accent"></div><div class="pick-card-body">'
      +'<div class="matchup-logos">'
      +'<div class="team-block away">'+logoImg(p.away_team)+'<div class="team-info"><div class="team-city">'+awayCity+'</div><div class="team-name">'+awayName+'</div></div></div>'
      +'<div class="vs-badge">@</div>'
      +'<div class="team-block home"><div class="team-info"><div class="team-city">'+homeCity+'</div><div class="team-name">'+homeName+'</div></div>'+logoImg(p.home_team)+'</div>'
      +'</div>'
      +'<div class="pick-winner-row">'
      +'<div class="pick-winner-line">✅ '+pickLast+' ML '+oddsStr+'</div>'
      +confMeter(p.margin||0)
      +'</div>'
      +'<div class="edge-bar-wrap"><div class="edge-bar-label"><span>Model Edge</span><span style="color:var(--text);font-weight:700">'+marginStr+'</span></div>'
      +'<div class="edge-bar"><div class="edge-fill" data-pct="'+edgePct+'"></div></div></div>'
      +'<div class="era-section">'
      +'<div class="era-row"><span class="era-name">📉 '+awayLast+'</span><span><span class="era-val">'+awayERA+'</span> ERA'+awayL3+'</span></div>'
      +'<div class="era-row"><span class="era-name">📈 '+homeLast+'</span><span><span class="era-val">'+homeERA+'</span> ERA'+homeL3+'</span></div>'
      +'</div>'
      +'<button class="reasoning-toggle" id="rb-'+i+'" onclick="toggleReasoning('+i+')">'
      +'<span>🧠 Why this pick?</span><span class="arr">▾</span></button>'
      +'<div class="reasoning-body" id="rd-'+i+'">'+reasonHtml+'</div>'
      +'</div></div>';
  }).join('');
  return ticker
    +'<div style="text-align:center;padding:6px 4px 2px;font-size:13px;color:var(--muted)">'+today+'</div>'
    +'<div class="refresh-note">Auto-refreshes every 5 min</div>'
    +cards;
}

/* ── Record tab ─────────────────────────────────────────────────────── */
function loadRecord() {
  setPanel('panel-record', spinner());
  Promise.all([fetchJSON('/api/record'), fetchJSON('/api/chart'), fetchJSON('/api/picks')])
    .then(function(results){
      var rec=results[0], chartPts=results[1], allPicks=results[2];
      setPanel('panel-record', renderRecord(rec, allPicks));
      renderChart(chartPts);
      animatePctBars();
      animateVal(document.getElementById('anim-wins'),   rec.wins,   0);
      animateVal(document.getElementById('anim-losses'), rec.losses, 0);
      animateVal(document.getElementById('anim-pushes'), rec.pushes, 0);
      animateVal(document.getElementById('anim-roi'),    Math.abs(rec.roi),    1, rec.roi>=0?'+':'-', '%');
      animateVal(document.getElementById('anim-profit'), Math.abs(rec.profit), 0, rec.profit>=0?'+$':'-$');
    }).catch(function(e){
      setPanel('panel-record','<div class="empty"><p>Failed to load: '+e.message+'</p></div>');
    });
}

function getThisWeek(picks) {
  var now=new Date(), start=new Date(now);
  start.setDate(now.getDate()-now.getDay()); start.setHours(0,0,0,0);
  var w=0,l=0,p=0;
  picks.forEach(function(pick){
    if(!pick.date) return;
    if(new Date(pick.date+'T00:00:00')>=start){
      var r=(pick.result||'').toUpperCase();
      if(r==='W')w++; else if(r==='L')l++; else if(r==='P')p++;
    }
  });
  return {w:w,l:l,p:p};
}

function renderRecord(r, allPicks) {
  var winColor    = r.win_pct>=52 ? 'green' : 'red';
  var profitColor = r.profit>=0   ? 'green' : 'red';
  var roiColor    = r.roi>=0      ? 'green' : 'red';
  var week        = getThisWeek(allPicks);
  var weekPct     = (week.w+week.l)>0 ? (week.w/(week.w+week.l)*100).toFixed(0)+'%' : '—';
  var streakHtml  = '';
  if(r.streak>0 && r.streak_type) {
    var cls=r.streak_type==='W'?'streak-w':'streak-l';
    var lbl=r.streak_type==='W'?'🔥 '+r.streak+'-Game Win Streak':'❄️ '+r.streak+'-Game Losing Streak';
    streakHtml='<div style="margin-top:10px"><span class="streak-badge '+cls+'">'+lbl+'</span></div>';
  }
  return '<div class="record-hero">'
    +'<div class="wlp">'
    +'<div class="wlp-item win"><div class="wlp-num" id="anim-wins">'+r.wins+'</div><div class="wlp-lbl">Wins</div></div>'
    +'<div class="wlp-item loss"><div class="wlp-num" id="anim-losses">'+r.losses+'</div><div class="wlp-lbl">Losses</div></div>'
    +'<div class="wlp-item push"><div class="wlp-num" id="anim-pushes">'+r.pushes+'</div><div class="wlp-lbl">Pushes</div></div>'
    +'</div>'+streakHtml+'</div>'
    +'<div class="win-pct-bar-wrap"><div class="win-pct-header"><span class="win-pct-title">Win Rate</span><span class="win-pct-val '+winColor+'">'+r.win_pct+'%</span></div>'
    +'<div class="pct-bar"><div class="pct-fill '+winColor+'" data-pct="'+Math.min(r.win_pct,100)+'"></div></div>'
    +'<div class="pct-markers"><span>0%</span><span style="color:var(--accent);font-weight:700">Break-even: 52.4%</span><span>100%</span></div></div>'
    +'<div class="stats-grid">'
    +'<div class="stat-box"><div class="stat-val '+roiColor+'" id="anim-roi">'+(r.roi>=0?'+':'')+r.roi+'%</div><div class="stat-lbl">ROI</div></div>'
    +'<div class="stat-box"><div class="stat-val '+profitColor+'" id="anim-profit">'+(r.profit>=0?'+$':'-$')+Math.abs(r.profit)+'</div><div class="stat-lbl">Profit (units)</div></div>'
    +'</div>'
    +'<div class="week-box"><h3>📅 This Week</h3><div class="week-record">'
    +'<div class="week-item w"><div class="week-num">'+week.w+'</div><div class="week-lbl">Wins</div></div>'
    +'<div class="week-item l"><div class="week-num">'+week.l+'</div><div class="week-lbl">Losses</div></div>'
    +'<div class="week-item p"><div class="week-num">'+week.p+'</div><div class="week-lbl">Pushes</div></div>'
    +'<div class="week-item"><div class="week-num" style="color:var(--text)">'+weekPct+'</div><div class="week-lbl">Win %</div></div>'
    +'</div></div>'
    +'<div class="chart-card"><h3>Cumulative Profit</h3><div class="chart-wrap"><canvas id="profit-chart"></canvas></div></div>';
}

function renderChart(points) {
  var ctx=document.getElementById('profit-chart');
  if(!ctx) return;
  if(chartInst){ chartInst.destroy(); chartInst=null; }
  if(!points.length){ ctx.parentElement.innerHTML='<div class="empty" style="padding:20px"><p>No completed picks yet</p></div>'; return; }
  var labels=points.map(function(p){ return new Date(p.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); });
  var data=points.map(function(p){ return p.profit; });
  var last=data[data.length-1]||0, color=last>=0?'#00e676':'#ff4444';
  var isDark=getTheme()==='dark';
  chartInst=new Chart(ctx,{
    type:'line',
    data:{labels:labels,datasets:[{data:data,borderColor:color,backgroundColor:last>=0?'rgba(0,230,118,0.08)':'rgba(255,68,68,0.08)',borderWidth:2,pointRadius:0,pointHoverRadius:5,fill:true,tension:0.4}]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},animation:{duration:1000},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e1e1e',borderColor:'#333',borderWidth:1,titleColor:'#aaa',bodyColor:color,padding:10,callbacks:{label:function(c){ return ' '+(c.raw>=0?'+':'')+'$'+c.raw.toFixed(0); }}}},
      scales:{
        x:{ticks:{color:isDark?'#555':'#9ca3af',font:{size:10},maxTicksLimit:6},grid:{color:isDark?'#1a1a1a':'#e5e7eb'}},
        y:{ticks:{color:isDark?'#555':'#9ca3af',font:{size:10},callback:function(v){ return (v>=0?'+':'')+'$'+v; }},grid:{color:isDark?'#1a1a1a':'#e5e7eb'}}
      }
    }
  });
}

/* ── History tab ────────────────────────────────────────────────────── */
function loadHistory() {
  setPanel('panel-history', spinner());
  fetchJSON('/api/picks').then(function(picks){
    setPanel('panel-history', renderHistory(picks));
  }).catch(function(e){
    setPanel('panel-history','<div class="empty"><p>Failed to load: '+e.message+'</p></div>');
  });
}

function renderHistory(picks) {
  if(!picks.length) return '<div class="empty"><div class="big">📜</div><p>No pick history yet</p></div>';
  var rows=picks.map(function(p){
    var r=(p.result||'').toUpperCase();
    var cls=r==='W'?'result-w':r==='L'?'result-l':'result-p';
    var lA=logoUrl(p.away_team), lH=logoUrl(p.home_team);
    var iA=lA?'<img src="'+lA+'" style="width:13px;height:13px;object-fit:contain;vertical-align:middle;margin-right:2px" onerror="this.style.display=\'none\'">':'';
    var iH=lH?'<img src="'+lH+'" style="width:13px;height:13px;object-fit:contain;vertical-align:middle;margin-right:2px" onerror="this.style.display=\'none\'">':'';
    return '<tr><td>'+formatDate(p.date)+'</td><td>'+iA+abbrev(p.away_team)+' @ '+iH+abbrev(p.home_team)+'</td>'
      +'<td>'+abbrev(p.pick)+'</td><td>'+(toDecimalOdds(p.pick_odds)||'—')+'</td>'
      +'<td>'+(p.margin!=null?p.margin.toFixed(2):'—')+'</td>'
      +'<td class="'+cls+'">'+(r||'—')+'</td></tr>';
  }).join('');
  return '<div class="hist-table-wrap"><table><thead><tr><th>Date</th><th>Matchup</th><th>Pick</th><th>Odds</th><th>Edge</th><th>Result</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

/* ── Helpers ────────────────────────────────────────────────────────── */
function toDecimalOdds(s) {
  if(!s) return '';
  var v=parseFloat(s); if(isNaN(v)) return s;
  if(v<=-100) return (1+100/Math.abs(v)).toFixed(2);
  if(v>=100)  return (1+v/100).toFixed(2);
  return v.toFixed(2);
}
function formatDate(d) {
  if(!d) return '—';
  return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function abbrev(name) {
  if(!name) return '—';
  var p=name.split(' '); return p.length>=2?p[p.length-1]:name;
}

/* ── Load & refresh ─────────────────────────────────────────────────── */
function loadTab(tab) {
  if(tab==='today')   loadToday();
  if(tab==='record')  loadRecord();
  if(tab==='history') loadHistory();
}
function refreshAll() {
  loadTab(activeTab);
  var now=new Date();
  document.getElementById('last-refresh').textContent =
    now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
refreshAll();
setInterval(refreshAll, REFRESH);
if('serviceWorker' in navigator) { navigator.serviceWorker.register('/static/sw.js').catch(function(){}); }
</script>
